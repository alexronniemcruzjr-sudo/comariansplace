<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Comarian's Place</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏡</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sand: #f5f0e8; --sand-dark: #e8e0d0; --earth: #8b6f47; --earth-dark: #5c4730;
      --green: #3d5a3e; --green-light: #5a7d5b; --white: #fdfaf5; --text: #2a2018;
      --text-light: #6b5a45; --accent: #c8a96e;
    }
    body {
      font-family: 'DM Sans', sans-serif; background: var(--earth-dark);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--white); border-radius: 16px; padding: 48px 40px;
      max-width: 420px; width: 100%; box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }
    .login-logo {
      font-family: 'Cormorant Garamond', serif; font-size: 1.8rem;
      font-weight: 600; color: var(--earth-dark); text-align: center; margin-bottom: 8px;
    }
    .login-logo span { color: var(--green); font-style: italic; }
    .login-sub {
      text-align: center; font-size: 0.85rem; color: var(--text-light);
      margin-bottom: 32px;
    }
    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .form-group label {
      font-size: 0.72rem; font-weight: 500; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-light);
    }
    .form-group input {
      padding: 14px 16px; border: 1.5px solid var(--sand-dark); border-radius: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; color: var(--text);
      background: var(--white); outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(61,90,62,0.1); }
    .login-btn {
      width: 100%; background: var(--green); color: var(--white); border: none;
      padding: 14px; border-radius: 6px; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s;
      margin-top: 8px;
    }
    .login-btn:hover { background: var(--green-light); }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      padding: 12px 16px; border-radius: 8px; font-size: 0.82rem;
      margin-bottom: 16px; display: none;
    }
    .back-link {
      display: block; text-align: center; margin-top: 24px;
      color: var(--text-light); font-size: 0.82rem; text-decoration: none;
    }
    .back-link:hover { color: var(--earth); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">Comarian's <span>Place</span></div>
    <p class="login-sub">Admin Dashboard</p>
    <div class="error-msg" id="errorMsg"></div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="admin@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="Enter password"/>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
    </form>
    <a href="/" class="back-link">Back to website</a>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('cp_token')) {
      window.location.href = '/admin.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Login failed');
        }

        localStorage.setItem('cp_token', data.token);
        localStorage.setItem('cp_user', JSON.stringify(data.user));
        window.location.href = '/admin.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
